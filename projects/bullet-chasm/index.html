<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title> | bullet_chasm</title>
    
    <link rel="stylesheet" href="https://exoteric.systems/style.css?h=427935746a7f0a390a0fb4e35cd9a02711a3ee44cd8dad10e100af850f5eebc0">
    
</head>
<body>
    
<header class="space">
    <a href="https:&#x2F;&#x2F;exoteric.systems">&LeftArrow; Home</a>
</header>

    
<main>
    <h1>bullet_chasm</h1>
    
    <div class="space"></div>
    <p>A 2.5d bullet hell inspired game made in Godot(maybe?!)</p>
<span id="continue-reading"></span>
</main>

    <div class="dark-mode-buttons">
        <button class="dark-mode-button" id="dark-mode-on"><img src="https://exoteric.systems/dark_mode.svg" width="24" height="24" alt=""></button>
        <button class="dark-mode-button" id="dark-mode-off"><img src="https://exoteric.systems/light_mode.svg" width="24" height="24" alt=""></button>
    </div>
    <script>
        const cls = document.body.classList;
        const getSessionTheme = sessionStorage.getItem("theme");
        if (getSessionTheme === "dark") {
            cls.toggle("dark-mode", true);
        } else if (getSessionTheme === "light") {
            cls.toggle("dark-mode", false);
        } else if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
            cls.toggle("dark-mode", true);
        }

        document.getElementById("dark-mode-on").addEventListener("click", function(e) {
            cls.toggle("dark-mode", true);
            sessionStorage.setItem("theme", "dark");
        });
        document.getElementById("dark-mode-off").addEventListener("click", function(e) {
            cls.toggle("dark-mode", false);
            sessionStorage.setItem("theme", "light");
        });
    </script>
    <noscript>
        <style>
            .dark-mode-buttons {
                display: none;
            }
        </style>
    </noscript>
</body>
</html>
